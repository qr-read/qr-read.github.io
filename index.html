<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 15px;
      font-family: system-ui, sans-serif;
    }
    input {
      padding: 8px;
      font-size: 16px;
    }
    #result {
      padding: 10px;
      font-size: 16px;
      text-align: center;
      width: 300px;
      background: #f5f5f5;
      border-radius: 4px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <input type="file" id="file-input" accept="image/*">
  <div id="result">result</div>

  <script>
    const fileInput = document.getElementById('file-input');
    const resultDiv = document.getElementById('result');

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, img.width, img.height);
          const imageData = ctx.getImageData(0, 0, img.width, img.height);
          const code = jsQR(imageData.data, img.width, img.height);
          
          if (code) {
            resultDiv.textContent = code.data;
          } else {
            resultDiv.textContent = 'no QR found';
          }
        };
        img.onerror = function() {
          resultDiv.textContent = 'image load error';
        };
        img.src = event.target.result;
      };
      reader.onerror = function() {
        resultDiv.textContent = 'file read error';
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
