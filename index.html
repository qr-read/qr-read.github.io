<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 10px;
    }
    video {
      width: 300px;
      height: 300px;
      object-fit: cover;
      display: none;
    }
    input, button {
      padding: 5px;
      font-size: 16px;
    }
    #file-input {
      width: 200px;
    }
    #cam-btn {
      width: 90px;
    }
    .row {
      display: flex;
      gap: 10px;
    }
    .result-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 300px;
    }
    #result {
      flex: 1;
      padding: 8px;
      font-size: 14px;
      text-align: center;
      background: #f5f5f5;
      word-break: break-all;
    }
    #copy-btn {
      width: 32px;
      height: 32px;
      padding: 0;
      background: #f5f5f5;
      border: 1px solid #ccc;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #copy-btn svg {
      width: 18px;
      height: 18px;
      stroke: #333;
      stroke-width: 2;
      fill: none;
    }
  </style>
</head>
<body>
  <div class="row">
    <input type="file" id="file-input" accept="image/*">
    <button id="cam-btn">camera</button>
  </div>
  <video id="video" autoplay playsinline muted></video>
  <div class="result-row">
    <div id="result">result</div>
    <button id="copy-btn">
      <svg viewBox="0 0 24 24">
        <rect x="9" y="3" width="12" height="16" rx="1" ry="1"/>
        <path d="M5 7H3a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2"/>
      </svg>
    </button>
  </div>

  <script>
    const video = document.getElementById('video');
    const resultDiv = document.getElementById('result');
    const camBtn = document.getElementById('cam-btn');
    const fileInput = document.getElementById('file-input');
    const copyBtn = document.getElementById('copy-btn');
    let stream = null;

    copyBtn.onclick = () => {
      navigator.clipboard.writeText(resultDiv.textContent);
      const svg = copyBtn.querySelector('svg');
      const original = svg.innerHTML;
      svg.innerHTML = '<polyline points="20 6 9 17 4 12" stroke="green" fill="none" stroke-width="2"/>';
      setTimeout(() => { svg.innerHTML = original; }, 1000);
    };

    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const img = new Image();
      img.src = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const code = jsQR(ctx.getImageData(0, 0, img.width, img.height).data, img.width, img.height, { inversionAttempts: "attemptBoth" });
        resultDiv.textContent = code ? code.data : 'no QR';
        URL.revokeObjectURL(img.src);
      };
    };

    camBtn.onclick = () => {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        video.style.display = 'none';
        stream = null;
        camBtn.textContent = 'camera';
        return;
      }
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(s => {
        stream = s;
        video.srcObject = stream;
        video.style.display = 'block';
        video.play();
        camBtn.textContent = 'stop';
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        function scan() {
          if (!stream) return;
          if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height, { inversionAttempts: "attemptBoth" });
            if (code) resultDiv.textContent = code.data;
          }
          requestAnimationFrame(scan);
        }
        scan();
      });
    };
  </script>
</body>
</html>
