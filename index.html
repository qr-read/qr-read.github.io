<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      font-family: system-ui, sans-serif;
    }
    video {
      width: 300px;
      height: 300px;
      object-fit: cover;
      display: none;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 300px;
    }
    input, button {
      width: 100%;
      padding: 8px;
      font-size: 16px;
      border: 1px solid #ccc;
      background: white;
    }
    .result-area {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 300px;
    }
    #result {
      flex: 1;
      padding: 8px;
      background: #f5f5f5;
      text-align: center;
      border: 1px solid #ccc;
    }
    #copy-btn {
      width: 40px;
      padding: 8px;
      background: white;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <div class="buttons">
    <input type="file" id="file-input" accept="image/*">
    <button id="cam-btn">start camera</button>
  </div>
  <video id="video" autoplay playsinline muted></video>
  <div class="result-area">
    <div id="result">result</div>
    <button id="copy-btn">📄</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const resultDiv = document.getElementById('result');
    const camBtn = document.getElementById('cam-btn');
    const fileInput = document.getElementById('file-input');
    const copyBtn = document.getElementById('copy-btn');
    let stream = null;

    copyBtn.onclick = () => {
      navigator.clipboard.writeText(resultDiv.textContent);
      copyBtn.textContent = '✅';
      setTimeout(() => { copyBtn.textContent = '📄'; }, 1000);
    };

    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const img = new Image();
      img.src = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const code = jsQR(ctx.getImageData(0, 0, img.width, img.height).data, img.width, img.height, { inversionAttempts: "attemptBoth" });
        resultDiv.textContent = code ? code.data : 'no QR';
        URL.revokeObjectURL(img.src);
      };
    };

    camBtn.onclick = () => {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        video.style.display = 'none';
        stream = null;
        camBtn.textContent = 'start camera';
        return;
      }
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(s => {
        stream = s;
        video.srcObject = stream;
        video.style.display = 'block';
        video.play();
        camBtn.textContent = 'stop camera';
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        function scan() {
          if (!stream) return;
          if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height, { inversionAttempts: "attemptBoth" });
            if (code) resultDiv.textContent = code.data;
          }
          requestAnimationFrame(scan);
        }
        scan();
      });
    };
  </script>
</body>
</html>
